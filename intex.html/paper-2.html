<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors Game</title>
  <style>
    :root {
      --bg-color: #000000;
      --text-color: #ffffff;
      --accent-color: #ff0055;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    /* Light Mode အတွက် အရောင်များ */
    .light-mode {
      --bg-color: #f0f2f5;
      --text-color: #1a1a1a;
      --accent-color: #007bff;
      --glass-bg: rgba(0, 0, 0, 0.05);
      --glass-border: rgba(0, 0, 0, 0.1);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Poppins', sans-serif;
      transition: all 0.9s ease;
      /* အရောင်ပြောင်းရင် ချောမွေ့အောင် */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .img-movesty {
      background: none;
      border: 3px dotted var(--text-color);
      cursor: pointer;
      width: 120px;
      height: 120px;
      border-radius: 60px;
      margin: 10px;
      transition: all 0.2s ease;
    }

    .score {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      padding: 20px;
      border-radius: 15px;
      margin-top: 40px;
      min-width: 250px;
      text-align: center;
    }

    #themeToggle {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-color);
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
    }

    body {
      background: black;

      color: white;

      font-family: 'Poppins', sans-serif;

      background: var(--bg-color);

      color: var(--text-color);



      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;

    }





    h1 {

      font-size: 30px;

      font-weight: bold;

    }



    .img-move {

      height: 50px;

    }



    .img-movesty {

      background: none;

      border: 3px dotted white;

      cursor: pointer;

      width: 120px;

      height: 120px;

      border-radius: 60px;

      margin-right: 10px;

    }



    .img-movesty:hover {

      transform: scale(1.1);

      box-shadow: 0 0 20px #ff0055;

      /* Neon Glow */

      transition: all 0.2s ease;

    }



    /* ရမှတ်ပြတဲ့ box ကို မှန်ကြည်ရောင် လုပ်နည်း */

    .score {

      background: rgba(255, 255, 255, 0.1);

      backdrop-filter: blur(10px);

      border: 1px solid rgba(255, 255, 255, 0.2);

      padding: 20px;

      border-radius: 15px;

      margin-top: 60px;

    }



    .sc-result {

      font-size: 20px;

      margin-top: 20px;

    }







    .reset-score-button {

      background-color: white;

      color: black;

      border: none;

      padding: 10px 20px;

      cursor: pointer;

      border-radius: 5px;



    }



    .reset-score-button:hover {

      background-color: #ddd;

    }



    .reset-score-button:active {

      transform: translateY(2px);

      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);

    }



    .buttons {

      display: flex;

      gap: 20px;

      margin-top: 20px;

    }



    .game-info {

      display: flex;

      flex-direction: column;

      align-items: center;

      gap: 10px;

      margin-top: 20px;

    }



    .top-bar {

      display: flex;

      align-items: center;

      gap: 20px;

    }
  </style>

</head>

<body>

  <div class="top-bar">
    <h1>Rock, Paper, Scissors</h1>
    <button id="themeToggle">🌙</button>
  </div>
  <div>
    <button onclick="playGame('Rock');" class="img-movesty"><img src="rock-emoji.png" alt="Rock"
        class="img-move"></button>
    <button onclick="playGame('Paper');" class="img-movesty"><img src="paper-emoji.png" alt="Paper"
        class="img-move"></button>
    <button onclick="playGame('Scissors');" class="img-movesty"><img src="scissors-emoji.png" alt="Scissors"
        class="img-move"></button>
  </div>

  <div class="game-info">
    <p class="sc-result"></p>

    <p class="sc-move">You
      <img src="rock-emoji.png" alt="Rock" class="img-move">

      <img src="scissors-emoji.png" alt="Scissors" class="img-move">
      Computer
    </p>
    <p class="sc-score score"> </p>
  </div>
  <button onclick="resetScore();" class="reset-score-button">Reset Score</button>

  <script src="paper-2.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</body>

</html>
